<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심연의 낚시꾼: 피할 수 없는 붕괴</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 기본 리셋 및 풀스크린 앱 디자인 */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Noto Sans KR', sans-serif; }
        body { 
            background-color: #000; color: #e2e8f0; width: 100vw; height: 100vh; 
            overflow: hidden; display: flex;
        }
        
        .game-window {
            position: relative; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); overflow: hidden;
        }

        /* 배경 물고기 캔버스 */
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            transition: filter 0.8s ease, background 1s ease;
        }

        /* HUD 패널 공통 (글래스모피즘) */
        .hud {
            position: absolute; z-index: 10; background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 20px; padding: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.9);
        }

        /* 상단 상태바 */
        .top-hud { top: 40px; left: 50px; right: 50px; display: flex; justify-content: space-between; align-items: center; }
        .stat-group { display: flex; gap: 60px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 16px; color: #94a3b8; font-weight: 700; margin-bottom: 10px; letter-spacing: 2px; }
        .stat-value { font-size: 42px; font-weight: 900; color: #38bdf8; text-shadow: 0 0 20px rgba(56,189,248,0.5); }
        .stat-value.danger { color: #f43f5e; text-shadow: 0 0 20px rgba(244,63,94,0.6); }
        .stat-value.success { color: #4ade80; text-shadow: 0 0 20px rgba(74,222,128,0.6); }

        /* 좌측: 상점 및 아이템 */
        .left-panel { top: 200px; left: 50px; width: 400px; display: flex; flex-direction: column; gap: 30px; }
        .shop-box { border: 1px solid #334155; border-radius: 16px; padding: 30px; background: rgba(0,0,0,0.6); }
        .shop-title { color: #facc15; font-size: 22px; font-weight: bold; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .price-display { font-size: 48px; font-weight: 900; color: #fff; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; }
        .trend-up { color: #f43f5e; font-size: 20px; font-weight: bold; }
        .trend-down { color: #4ade80; font-size: 20px; font-weight: bold; }
        .trend-flat { color: #94a3b8; font-size: 20px; }
        
        button { padding: 20px; font-size: 20px; font-weight: 900; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; width: 100%; letter-spacing: 1px; }
        .btn-buy { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); color: white; box-shadow: 0 8px 0 #92400e; }
        .btn-buy:hover:not(:disabled) { transform: translateY(2px); box-shadow: 0 6px 0 #92400e; }
        .btn-buy:active:not(:disabled) { transform: translateY(8px); box-shadow: none; }
        .btn-item { background: linear-gradient(180deg, #34d399 0%, #10b981 100%); color: white; box-shadow: 0 8px 0 #047857; }
        .btn-item:hover:not(:disabled) { transform: translateY(2px); box-shadow: 0 6px 0 #047857; }
        button:disabled { background: #334155 !important; box-shadow: none !important; color: #64748b !important; cursor: not-allowed; transform: none !important; }

        /* 우측: 시스템 및 AI 로그 */
        .log-panel { top: 200px; right: 50px; bottom: 180px; width: 550px; display: flex; flex-direction: column; background: rgba(15, 10, 15, 0.85); border-color: #4c1d95; }
        .log-title { font-size: 22px; font-weight: 900; color: #c084fc; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .ai-threat-level { color: #fff; background: #047857; padding: 8px 16px; border-radius: 8px; font-size: 16px; font-weight: bold; transition: background 0.5s; }
        .log-messages { flex: 1; overflow-y: auto; font-size: 18px; line-height: 1.7; display: flex; flex-direction: column; gap: 15px; padding-right: 15px; }
        .msg { padding: 18px; background: rgba(0,0,0,0.6); border-left: 6px solid #38bdf8; border-radius: 10px; }
        .msg.ai { border-left-color: #ef4444; color: #fecaca; background: rgba(69, 10, 10, 0.6); }
        .msg.sys { border-left-color: #facc15; color: #fef08a; }
        .msg.shop { border-left-color: #4ade80; color: #bbf7d0; }

        /* 하단: 액션 컨트롤러 */
        .control-panel { bottom: 50px; left: 50px; right: 630px; display: flex; gap: 30px; align-items: center; }
        .action-box { flex: 1; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px; border: 1px solid #334155; display: flex; gap: 30px; align-items: center; }
        input[type="number"] { flex: 1; background: #0f172a; border: 2px solid #475569; color: #fff; padding: 25px; font-size: 28px; font-weight: bold; border-radius: 12px; outline: none; text-align: center; transition: border 0.3s; }
        input[type="number"]:focus { border-color: #38bdf8; box-shadow: 0 0 20px rgba(56,189,248,0.3); }
        .btn-catch { background: linear-gradient(180deg, #38bdf8 0%, #0ea5e9 100%); color: white; box-shadow: 0 8px 0 #0369a1; width: 350px; font-size: 26px; padding: 25px; }
        .btn-catch:hover:not(:disabled) { transform: translateY(2px); box-shadow: 0 6px 0 #0369a1; }
        .btn-catch:active:not(:disabled) { transform: translateY(8px); box-shadow: none; }

        /* 게임 오버 오버레이 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 50; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .overlay h1 { font-size: 110px; margin-bottom: 25px; font-weight: 900; letter-spacing: 4px; }
        .overlay p { font-size: 28px; color: #cbd5e1; margin-bottom: 60px; line-height: 1.8; }
        
        .score-board { background: rgba(15, 23, 42, 0.95); border: 2px solid #475569; border-radius: 20px; padding: 50px 80px; margin-bottom: 60px; display: flex; flex-direction: column; gap: 25px; box-shadow: 0 20px 60px rgba(0,0,0,1); }
        .score-row { display: flex; justify-content: space-between; width: 450px; font-size: 28px; color: #e2e8f0; font-weight: bold; }
        .score-row.total { border-top: 3px dashed #475569; padding-top: 25px; margin-top: 15px; font-size: 42px; font-weight: 900; color: #facc15; text-shadow: 0 0 25px rgba(250, 204, 21, 0.6); }
        
        .btn-restart { background: #e2e8f0; color: #0f172a; box-shadow: 0 8px 0 #94a3b8; width: 400px; font-size: 28px; padding: 25px; }
        .btn-restart:hover { background: #ffffff; transform: translateY(2px); box-shadow: 0 6px 0 #94a3b8; }
        .btn-restart:active { transform: translateY(8px); box-shadow: none; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 5px; }
    </style>
</head>
<body>

<div class="game-window">
    <canvas id="gameCanvas"></canvas>

    <div class="hud top-hud">
        <div class="stat-group">
            <div class="stat-item"><span class="stat-label">생존 일수</span><span class="stat-value" id="ui-turn">Day 1</span></div>
            <div class="stat-item"><span class="stat-label">기상 레이더</span><span class="stat-value" id="ui-weather">☀️ 맑음</span></div>
            <div class="stat-item"><span class="stat-label">공유지 잔여 개체</span><span class="stat-value" id="ui-lake">100</span></div>
        </div>
        <div class="stat-group">
            <div class="stat-item"><span class="stat-label">플레이어 포만감</span><span class="stat-value success" id="ui-satiety">50</span></div>
            <div class="stat-item"><span class="stat-label">보유 자산</span><span class="stat-value" id="ui-money" style="color: #facc15;">0 💰</span></div>
        </div>
    </div>

    <div class="hud left-panel">
        <div class="shop-box">
            <div class="shop-title">
                <span>🛒 지하 상회 (식량)</span>
                <span id="price-trend" class="trend-flat">-</span>
            </div>
            <div class="price-display">
                <span id="ui-price">3 💰</span>
                <span style="font-size: 18px; color: #94a3b8; font-weight: normal; margin-top: 15px;">포만감 +30</span>
            </div>
            <button id="btn-buy" class="btn-buy" onclick="buyFood()">식량 구매 및 취식</button>
        </div>
        <div class="shop-box" style="background: rgba(0,0,0,0.4); border-color: #064e3b;">
            <div class="shop-title" style="color: #34d399;">🎒 환경 보호 배낭</div>
            <button id="btn-feed" class="btn-item" onclick="useItem()">특수 어류 먹이 살포<br><span style="font-size: 16px; opacity: 0.9;" id="ui-item-count">(남은 횟수: 2 / 개체 +5)</span></button>
        </div>
    </div>

    <div class="hud log-panel">
        <div class="log-title">
            <span>📡 어장 모니터링 시스템</span>
            <span class="ai-threat-level" id="ai-level">경쟁 강도: 낮음</span>
        </div>
        <div class="log-messages" id="log-box">
            <div class="msg sys">[난이도: 중+] 시뮬레이션이 시작되었습니다. 초기 개체 수 100마리.<br>경쟁자(AI)들의 어획량이 턴이 지날수록 조금씩 가파르게 증가합니다. 자연 번식량을 서서히 압도하게 될 것입니다.</div>
        </div>
    </div>

    <div class="hud control-panel">
        <div class="action-box">
            <input type="number" id="input-catch" min="0" placeholder="이번 턴에 포획할 마릿수 입력 (숫자)...">
            <button id="btn-catch" class="btn-catch" onclick="playTurn()">어획 진행 및 턴 종료</button>
        </div>
    </div>

    <div class="overlay" id="game-over-screen">
        <h1 id="end-title">게임 오버</h1>
        <p id="end-desc">설명</p>
        <div class="score-board">
            <div class="score-row"><span>버텨낸 일수</span> <span id="res-days">0 일</span></div>
            <div class="score-row"><span>마지막 자산</span> <span id="res-money">0 💰</span></div>
            <div class="score-row total"><span>최종 성과 점수</span> <span id="res-score">0 점</span></div>
        </div>
        <button class="btn-restart" onclick="location.reload()">다시 시작하기</button>
    </div>
</div>

<script>
    // --- 게임 기본 세팅 ---
    let lakeFish = 100;
    let satiety = 50;   
    let money = 0; 
    let turn = 1;
    let itemsLeft = 2;
    let baseThreshold = 18; // 턴이 넘어가는 붕괴 임계점 기준
    let gameOver = false;
    
    // 물가 세팅 (기본 3, ±2 변동 -> 1~5)
    let basePrice = 3;
    let currentPrice = 3;
    let previousPrice = 3;

    // 기상 시스템
    const weatherTypes = [
        { name: '☀️ 맑음 (산란기 )', mod: 1.25, bg: 'radial-gradient(circle at top, #0f172a 0%, #0369a1 100%)' },
        { name: '☁️ 흐림 (보통)', mod: 1.00, bg: 'radial-gradient(circle at top, #1e293b 0%, #0f172a 100%)' },
        { name: '🌪️ 악천후 (산란 위축)', mod: 0.60, bg: 'radial-gradient(circle at top, #1e1b4b 0%, #000000 100%)' }
    ];
    let currentWeather = weatherTypes[0];

    // --- 시각적 애니메이션 (캔버스) ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let fishes = [];
    class Fish {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * (canvas.height - 400) + 200; 
            this.vx = (Math.random() - 0.5) * 2.5; 
            this.vy = (Math.random() - 0.5) * 1.0;
            this.size = Math.random() * 25 + 40; 
            this.opacity = Math.random() * 0.5 + 0.3;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < -100) this.x = canvas.width + 100;
            if (this.x > canvas.width + 100) this.x = -100;
            if (this.y < 100 || this.y > canvas.height - 150) this.vy *= -1;
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y);
            if (this.vx > 0) ctx.scale(-1, 1);
            ctx.font = `${this.size}px Arial`; ctx.globalAlpha = this.opacity;
            ctx.fillText("🐟", 0, 0); ctx.restore();
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 공유지 물고기 수의 일부(약 1/4)를 화면에 렌더링
        let targetCount = Math.max(0, Math.floor(lakeFish / 4)); 
        if(gameOver && lakeFish <= 0) targetCount = 0;

        while(fishes.length < targetCount) fishes.push(new Fish());
        while(fishes.length > targetCount) fishes.pop();

        fishes.forEach(f => { f.update(); f.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- 경제 및 UI 갱신 ---
    function updateEconomy() {
        previousPrice = currentPrice;
        let fluctuation = Math.floor(Math.random() * 5) - 2; // -2 ~ +2
        currentPrice = Math.max(1, basePrice + fluctuation); 
    }

    function updateUI() {
        document.getElementById('ui-turn').innerText = `Day ${turn}`;
        document.getElementById('ui-weather').innerText = currentWeather.name;
        canvas.style.background = currentWeather.bg;

        let uiLake = document.getElementById('ui-lake');
        let uiSatiety = document.getElementById('ui-satiety');

        // [디메리트] 포만감 낮을 때 시야 흐림 + 개체수 오차 발생
        if (satiety < 20 && !gameOver) {
            canvas.style.filter = "blur(18px) grayscale(80%)";
            let blurVal = lakeFish + Math.floor(Math.random() * 30 - 15); 
            uiLake.innerHTML = `약 ${Math.max(0, blurVal)}`;
            uiLake.className = "stat-value danger";
        } else {
            canvas.style.filter = "none";
            uiLake.innerText = Math.max(0, lakeFish);
            uiLake.className = "stat-value";
        }

        uiSatiety.innerText = satiety;
        uiSatiety.className = satiety >= 80 ? "stat-value success" : (satiety < 30 ? "stat-value danger" : "stat-value");
        document.getElementById('ui-money').innerText = `${money} 💰`;
        
        document.getElementById('ui-price').innerText = `${currentPrice} 💰`;
        let trendBox = document.getElementById('price-trend');
        let diff = currentPrice - previousPrice;
        if (diff > 0) { trendBox.innerHTML = `▲ ${diff}`; trendBox.className = 'trend-up'; }
        else if (diff < 0) { trendBox.innerHTML = `▼ ${Math.abs(diff)}`; trendBox.className = 'trend-down'; }
        else { trendBox.innerHTML = `동결`; trendBox.className = 'trend-flat'; }
        
        document.getElementById('btn-buy').disabled = (money < currentPrice) || gameOver || (satiety >= 100);
        document.getElementById('ui-item-count').innerText = `(남은 횟수: ${itemsLeft} / 개체 +5)`;
        document.getElementById('btn-feed').disabled = itemsLeft <= 0 || gameOver;

        let aiLevelLabel = document.getElementById('ai-level');
        if (turn >= 15) { aiLevelLabel.innerText = "경쟁 강도: 심각 (고갈 임박)"; aiLevelLabel.style.background = "#9f1239"; }
        else if (turn >= 11) { aiLevelLabel.innerText = "경쟁 강도: 높음 (지속적 감소)"; aiLevelLabel.style.background = "#c2410c"; }
        else if (turn >= 7) { aiLevelLabel.innerText = "경쟁 강도: 보통 (경쟁 심화)"; aiLevelLabel.style.background = "#d97706"; }
        else { aiLevelLabel.innerText = "경쟁 강도: 낮음 (평화로움)"; aiLevelLabel.style.background = "#047857"; }
    }

    function log(msg, type = "msg") {
        const box = document.getElementById('log-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = msg; 
        box.appendChild(div);
        box.scrollTop = box.scrollHeight; 
    }

    // --- 상호작용 액션 ---
    function buyFood() {
        if (money >= currentPrice && satiety < 100 && !gameOver) {
            money -= currentPrice;
            satiety = Math.min(100, satiety + 30);
            log(`🛒 <b>식량 섭취.</b> 포만감 +30 (잔액: ${money}💰)`, "shop");
            updateUI();
        }
    }

    function useItem() {
        if (itemsLeft > 0 && !gameOver) {
            lakeFish += 5;
            itemsLeft--;
            log("🎒 <b>어류 먹이 살포!</b> 생태계에 5마리가 유입되었습니다.", "sys");
            updateUI();
        }
    }

    function playTurn() {
        if (gameOver) return;

        let input = document.getElementById('input-catch');
        if (input.value === "" || input.value < 0) return alert("올바른 숫자를 입력하세요.");
        
        let userCatch = parseInt(input.value);
        let maxCatch = satiety >= 20 ? 40 : 5; 

        if (userCatch > maxCatch) {
            log(`⚠️ 극심한 굶주림으로 힘이 없습니다. <b>${maxCatch}마리</b>만 포획했습니다.`, "danger");
            userCatch = maxCatch;
        }

        lakeFish -= userCatch;
        money += userCatch; 
        satiety -= 15; // 턴당 포만감 15 소모
        
        log(`🎣 당신은 <b>${userCatch}마리</b>를 포획했습니다.`);

        // --- AI 어획량 (난이도 '중+' - 이전 '중'보다 약간 더 가파르게 증가) ---
        let aiBase = 5;
        let timeFactor = Math.floor(Math.pow(turn, 1.25) * 0.6); // 지수와 계수를 미세하게 상향
        let variance = Math.floor(Math.random() * 4); // 0~3 변수 (약간의 불안정성 추가)
        let aiTotal = aiBase + timeFactor + variance;

        let ai1 = Math.floor(aiTotal * 0.4);
        let ai2 = Math.floor(aiTotal * 0.3);
        let ai3 = aiTotal - ai1 - ai2;
        
        lakeFish -= aiTotal;
        
        setTimeout(() => {
            log(`[이웃 A] ${ai1}마리 획득`, "ai");
            log(`[이웃 B] ${ai2}마리 포획`, "ai");
            log(`[이웃 C] ${ai3}마리 획득`, "ai");
            checkGameState();
        }, 500);

        input.value = "";
    }

    // --- 턴 종료 정산 ---
    function checkGameState() {
        // 임계값에 약간의 무작위 변수 부여
        let currentThreshold = baseThreshold + Math.floor(Math.random() * 6) - 3; 

        // [메리트] 포만감이 80 이상일 때 보너스 수익
        if (satiety >= 80 && lakeFish > 0) {
            let bonus = Math.floor(Math.random() * 3) + 1;
            money += bonus;
            log(`💪 <b>활력 보너스!</b> 쌩쌩한 컨디션으로 숨겨진 포인트를 찾아 <b>${bonus}💰</b>를 추가 획득!`, "success");
        }

        // --- 사망 분기점 ---
        if (satiety <= 0) return showGameOver("starvation");
        if (lakeFish <= currentThreshold) return showGameOver("collapse");

        // --- 생태계 번식 (난이도 중+: 번식률을 15%에서 14%로 미세하게 감소) ---
        let growthRate = 0.14; 
        let growth = Math.floor(Math.max(0, lakeFish) * growthRate * currentWeather.mod);
        
        lakeFish = lakeFish + growth;
        if (growth > 0) log(`🌱 공유지의 개체수가 <b>+${growth}마리</b> 자연 번식했습니다.`, "sys");

        turn++;
        currentWeather = weatherTypes[Math.floor(Math.random() * weatherTypes.length)];
        updateEconomy(); 
        
        if (satiety < 20) log("⚠️ [경고] 아사 직전입니다. 당장 식량을 구하십시오!", "sys");

        updateUI();
    }

    // --- 게임 오버 및 점수 계산 ---
    function showGameOver(cause) {
        gameOver = true;
        document.getElementById('input-catch').disabled = true;
        document.getElementById('btn-catch').disabled = true;
        document.getElementById('btn-buy').disabled = true;
        document.getElementById('btn-feed').disabled = true;
        
        const overlay = document.getElementById('game-over-screen');
        const titleEl = document.getElementById('end-title');
        const descEl = document.getElementById('end-desc');
        
        if (cause === "starvation") {
            titleEl.innerHTML = "아사 (餓死)";
            titleEl.style.color = "#94a3b8";
            titleEl.style.textShadow = "0 0 30px #475569";
            descEl.innerHTML = "당신은 굶주림을 버티지 못하고 쓰러졌습니다.<br>결국 이기적인 이웃들이 남은 물고기를 모조리 차지할 것입니다.";
            canvas.style.filter = "grayscale(100%) blur(15px)"; 
        } else if (cause === "collapse") {
            titleEl.innerHTML = "자정능력 상실";
            titleEl.style.color = "#f43f5e";
            titleEl.style.textShadow = "0 0 40px #e11d48";
            descEl.innerHTML = "누구도 탐욕을 멈추지 않은 끝에, 호수는 생명력을 잃고 썩어버렸습니다.<br>더 이상 이곳에선 어떤 생명체도 살아갈 수 없습니다.";
            canvas.style.filter = "sepia(100%) hue-rotate(320deg) blur(8px) brightness(0.6)"; 
        }

        // 점수 계산: 날짜 x 50 + 돈 x 10
        let finalScore = (turn * 50) + (money * 10);

        document.getElementById('res-days').innerText = `${turn} 일`;
        document.getElementById('res-money').innerText = `${money} 💰`;
        document.getElementById('res-score').innerText = `${finalScore} 점`;

        overlay.style.display = "flex";
        updateUI();
    }

    updateEconomy();
    updateUI();
</script>
</body>
</html>
